<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Chat</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f4f4f4;
}

.chat-container{
    width:90%;
    max-width:700px;
    margin:30px auto;
    background:#fff;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 0 10px rgba(0,0,0,.1);
}

.chat-header{
    background-image: linear-gradient(270deg, #4ec7e4 0%, #53b2ac 100%);
    color:white;
    padding:15px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
}


.chat-box{
    height:600px;
    overflow-y:auto;
    padding:15px;
    background-color: #FFFFFFB3;
    background-image: url("https://lumacompanion.com/wp-content/uploads/2026/06/velvet_banner_bg.png");
    background-position: top center;
    background-repeat: no-repeat;
    background-size: cover;
    font-size: 14px;
    line-height: 1.4;
}

.user{
    text-align:right;
    margin:10px 0;
}

.bot{
    text-align:left;
    margin:10px 0;
}

.msg{
    display:inline-block;
    padding:10px 15px;
    border-radius:12px;
    max-width:70%;
    word-wrap:break-word;
}

.user .msg{
    background-image: linear-gradient(270deg, #4ec7e4 0%, #53b2ac 100%);
    color:white;
}

.bot .msg{
    background:#eeeeee;
    color:#222;
    position: relative;
}

.input-area{
    display:flex;
    padding:10px;
    border-top:1px solid #ddd;
}

input{
    flex:1;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    outline:none;
}
input:focus {border-color: #4ec7e4;}

button{
    margin-left:10px;
    padding:12px 20px;
    border:none;
    background-image: linear-gradient(270deg, #4ec7e4 0%, #53b2ac 100%);
    color:white;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    opacity:.9;
}

/* POPUP */

#popup{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.7);
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.popup-content{
    position:relative;
    background:white;
    padding:30px;
    border-radius:15px;
    text-align:center;
    width:350px;
}

.close-btn{
    position:absolute;
    top:10px;
    right:15px;
    font-size:22px;
    cursor:pointer;
}

.popup-content a{
    display:inline-block;
    margin-top:15px;
    background-image: linear-gradient(270deg, #4ec7e4 0%, #53b2ac 100%);
    color:white;
    padding:12px 20px;
    border-radius:8px;
    text-decoration:none;
}

.popup-content a:hover{
    opacity:.9;
}

</style>
</head>

<body>

<div class="chat-container">

    <div class="chat-header">
         AI Assistant 1
    </div>

    <div id="chatBox" class="chat-box"></div>

    <div class="input-area">
        <input
            type="text"
            id="message"
            placeholder="Type your message..."
            onkeypress="handleKeyPress(event)"
        >

        <button onclick="sendMessage()">
            Send
        </button>
    </div>

</div>

<!-- Popup -->

<div id="popup">

    <div class="popup-content">

        <span class="close-btn" onclick="closePopup()">
            ✖
        </span>

        <h2>🚀 Free Limit Reached</h2>

        <p>
            Aapke 5 free messages complete ho gaye hain.
        </p>

        <p>
            Continue karne ke liye hamari App download karein 📱
        </p>

        <a href="https://your-app-link.com" target="_blank">
            Download App
        </a>

    </div>

</div>

<script>

let chatLocked = localStorage.getItem("chatLocked") === "true";
window.onload = function(){

    const savedChat = localStorage.getItem("chatHistory");

    if(savedChat){

        document.getElementById("chatBox").innerHTML = savedChat;

        const chatBox = document.getElementById("chatBox");

        chatBox.scrollTop = chatBox.scrollHeight;
    }

}

function addMessage(text,type){

    const chatBox = document.getElementById("chatBox");

    const div = document.createElement("div");

    div.className = type;

    div.innerHTML =
        `<span class="msg">${text}</span>`;

    chatBox.appendChild(div);

    chatBox.scrollTop = chatBox.scrollHeight;

    localStorage.setItem(
        "chatHistory",
        chatBox.innerHTML
    );
}

async function sendMessage(){

    if(chatLocked){

        document.getElementById("popup").style.display = "flex";

        return;
    }

    const input = document.getElementById("message");

    const text = input.value.trim();

    if(!text) return;

    addMessage(text,"user");

    input.value = "";

    try{

        const response = await fetch(
            "/chat",
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body:JSON.stringify({
                    message:text
                })
            }
        );

        const data = await response.json();

        if(data.locked){

    chatLocked = true;

    localStorage.setItem(
        "chatLocked",
        "true"
    );

    addMessage(
        "🚀 Free limit reached. App download karke continue karein.",
        "bot"
    );

    document.getElementById("popup").style.display = "flex";

    return;
}

        addMessage(data.reply,"bot");

    }
    catch(err){

        console.error(err);

        addMessage(
            "❌ Server Error",
            "bot"
        );
    }
}

function handleKeyPress(event){

    if(event.key === "Enter"){
        sendMessage();
    }

}

function closePopup(){

    document.getElementById("popup").style.display = "none";

}

window.onclick = function(event){

    const popup = document.getElementById("popup");

    if(event.target === popup){
        popup.style.display = "none";
    }

}

    function clearChat(){

    localStorage.removeItem("chatHistory");

    localStorage.removeItem("chatLocked");

    location.reload();
}

</script>

</body>
</html>
